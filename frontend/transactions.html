<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transactions - FinanceOS</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Premium Transaction Page Overrides */
    body {
      margin: 0;
      padding: 0;
      background-color: #0b0f19; /* Standard app dark background */
      font-family: system-ui, -apple-system, sans-serif;
    }

    /* 🏗️ FIX: LAYOUT GRID CONTEXT */
    .app-container {
      display: flex;
      min-height: 100vh;
      width: 100vw;
      overflow-x: hidden;
    }

    /* 🛡️ FIX: PUSH MAIN CONTENT PAST FIXED SIDEBAR CONTAINER */
    .main-content {
      flex: 1;
      margin-left: 260px; /* Matches the exact width of your left sidebar! */
      min-width: 0;      /* Prevents content layout blowout */
    }

    .transactions-content {
      padding: 40px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .page-header {
      margin-bottom: 28px;
    }

    .page-title {
      font-size: 26px;
      font-weight: 700;
      color: #ffffff;
      margin: 0;
      letter-spacing: -0.02em;
    }

    .table-container {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
    }

    .expenses-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      text-align: left;
    }

    .expenses-table th {
      padding: 16px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #9ca3af;
      border-bottom: 1px solid #1f2937;
    }

    .expenses-table td {
      padding: 18px 16px;
      font-size: 14px;
      color: #e5e7eb;
      border-bottom: 1px solid #1f2937;
      vertical-align: middle;
    }

    .expenses-table tr:last-child td {
      border-bottom: none;
    }

    .category-badge {
      display: inline-flex;
      align-items: center;
      padding: 6px 12px;
      border-radius: 9999px;
      font-size: 12px;
      font-weight: 500;
      background: rgba(16, 185, 129, 0.08);
      color: #10b981;
      border: 1px solid rgba(16, 185, 129, 0.15);
    }

    .amount-cell {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
      font-size: 15px;
      color: #ef4444;
    }

    .btn-delete {
      background: rgba(239, 68, 68, 0.1);
      color: #ef4444;
      border: 1px solid rgba(239, 68, 68, 0.15);
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-delete:hover {
      background: #ef4444;
      color: #ffffff;
      box-shadow: 0 0 12px rgba(239, 68, 68, 0.3);
    }

    .empty-state {
      text-align: center;
      padding: 48px 0;
      color: #9ca3af;
    }
  </style>
</head>
<body>

  <div class="app-container">
    
    <aside class="sidebar">
      <div class="sidebar-brand">
        <span class="brand-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
        </span>
        <span class="brand-name">FinanceOS</span>
      </div>

      <nav class="sidebar-nav">
        <a href="index.html" onclick="window.location.href='index.html';" class="nav-item">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          Dashboard
        </a>
        
        <a href="transactions.html" onclick="window.location.href='transactions.html';" class="nav-item active">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          Transactions
        </a>
        
        <a href="#" class="nav-item">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
          Budget
        </a>
        <a href="#" class="nav-item">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          Analytics
        </a>
        <a href="#" class="nav-item">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
          Settings
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="user-avatar">RF</div>
        <div class="user-info">
          <span class="user-name">Rafay M.</span>
          <span class="user-role">Pro Plan</span>
        </div>
      </div>
    </aside>

    <main class="main-content">
      <div class="transactions-content">
        
        <div class="page-header">
          <h1 class="page-title">Transaction History</h1>
        </div>

        <div class="table-container">
          <table class="expenses-table">
            <thead>
              <tr>
                <th>Description</th>
                <th>Category</th>
                <th>Date</th>
                <th>Amount</th>
                <th style="text-align: right;">Action</th>
              </tr>
            </thead>
            <tbody id="expense-list">
              <tr>
                <td colspan="5" class="empty-state">Loading expenses database...</td>
              </tr>
            </tbody>
          </table>
        </div>

      </div>
    </main>

  </div>

  <script src="app.js"></script>
</body>
</html>
